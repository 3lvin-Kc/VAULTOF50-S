<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/x-icon" href="/src/assets/horror.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Default SEO (overridden per-page by react-helmet-async) -->
        <title>VaultOf50 — Horror Film Archive 1950–2000</title>
        <meta name="description" content="8,000+ horror films from 1950 to 2000. Every country. Every decade. Built by fans who take horror seriously." />
        <link rel="canonical" href="https://vault-50.co/" />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="VaultOf50" />
        <meta property="og:title" content="VaultOf50 — Horror Film Archive 1950–2000" />
        <meta property="og:description" content="8,000+ horror films from 1950 to 2000. Every country. Every decade. Built by fans who take horror seriously." />
        <meta property="og:url" content="https://vault-50.co/" />
        <meta property="og:image" content="https://vault-50.co/og-default.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:locale" content="en_US" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="VaultOf50 — Horror Film Archive 1950–2000" />
        <meta name="twitter:description" content="8,000+ horror films from 1950 to 2000. Every country. Every decade. Built by fans who take horror seriously." />
        <meta name="twitter:image" content="https://vault-50.co/og-default.png" />

        <!-- Fonts -->
        <link
            href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap"
            rel="stylesheet"
        />

        <!-- WebSite structured data (default, enhanced per-page) -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "VaultOf50",
            "alternateName": "Vault of 50",
            "url": "https://vault-50.co",
            "description": "8,000+ horror films from 1950 to 2000. Every country. Every decade. Built by fans who take horror seriously.",
            "potentialAction": {
                "@type": "SearchAction",
                "target": "https://vault-50.co/browse?search={search_term_string}",
                "query-input": "required name=search_term_string"
            }
        }
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
